apiVersion: apps/v1
kind: Deployment
metadata:
  name: monitoring-node-deployment
  namespace: {{.Values.namespace.name}}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: monitoring-node
  template:
    metadata:
      labels:
        app: monitoring-node
    spec:
      imagePullSecrets:
          {{- toYaml .Values.imagePullSecrets | nindent 8 }}
      containers:
        - name: monitoring-node
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          ports:
            - containerPort: 3000
